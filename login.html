<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Kamal Apparel</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Admin CSS -->
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-page">
  
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo">
          <i class="fas fa-crown"></i>
        </div>
        <h1 class="brand-name">Kamal Apparel</h1>
        <p class="brand-subtitle">Admin Dashboard</p>
      </div>
      
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="username">
            <i class="fas fa-user"></i> Username
          </label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
        </div>
        
        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i> Password
          </label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" id="toggle-password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" name="remember">
            <span>Remember me for 7 days</span>
          </label>
        </div>
        
        <div class="error-message" id="error-message" style="display: none;">
          Invalid username or password
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      
      <div class="login-footer">
        <p class="login-hint">
          <i class="fas fa-info-circle"></i> 
          Default credentials: <strong>kamal_admin</strong> / <strong>KamalApparel@2025</strong>
        </p>
        <a href="../index.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Back to Store
        </a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/admin-auth.js"></script>
</body>
</html>
